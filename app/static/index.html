<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voltlog - Packs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=27">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Voltlog">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
  <script>
    // Apply saved theme before first paint to avoid a flash.
    (function () {
      var t = localStorage.getItem("voltlog-theme");
      if (t) document.documentElement.dataset.theme = t;
    })();
  </script>
  <style>
    /* "Fill in values" shortcut on spent pack cards (whole card is a link, so
       this button stops the click from navigating to the pack page). */
    .pack-fill-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; margin-top: 10px; cursor: pointer;
      border-color: color-mix(in srgb, var(--check) 45%, var(--border));
      color: var(--check);
    }
    .pack-fill-btn .btn-svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="topnav">
      <a href="/">Home</a>
      <a href="/packs" class="active">Packs</a>
      <a href="/session">Session</a>
      <a href="/quads">Quads</a>
      <a href="/maintenance">Jobs</a>
    </nav>

    <header class="top">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 512 512" aria-hidden="true"><path d="M286 64 L150 280 H246 L226 448 L362 232 H266 Z"/></svg>
        <h1>Packs</h1>
        <span class="tagline">LiPo pack cycle &amp; health log</span>
      </div>
      <div class="header-actions">
        <button class="primary action-btn" id="add-pack-btn">
          <svg class="btn-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          <span>Add pack</span>
        </button>
        <button class="icon-btn action-btn" id="export-btn" title="Export all data to CSV">
          <svg class="btn-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
          <span>Export</span>
        </button>
        <button class="icon-btn action-btn" id="import-btn" title="Import data from CSV">
          <svg class="btn-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21V9M7 14l5-5 5 5M5 3h14"/></svg>
          <span>Import</span>
        </button>
        <button class="icon-btn action-btn" id="template-btn" title="Download a blank import CSV template">
          <svg class="btn-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h6"/></svg>
          <span>Template</span>
        </button>
        <input type="file" id="import-file" accept=".csv" class="hidden">
        <button class="icon-btn icon-only" id="bell-btn" title="Enable storage-hazard alerts" aria-label="Enable storage-hazard alerts">
          <svg class="btn-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M10 21h4"/></svg>
        </button>
        <button class="icon-btn icon-only" id="theme-btn" title="Toggle light / dark theme" aria-label="Toggle light / dark theme"></button>
      </div>
    </header>

    <div class="summary-bar hidden" id="summary-bar"></div>

    <div class="panel hidden" id="add-pack-panel">
      <h2>Add a pack</h2>
      <form id="add-pack-form">
        <div class="field-grid">
          <div class="field">
            <label for="pk-name">Name</label>
            <input type="text" id="pk-name" required placeholder="e.g. Tattu 1300 #3">
          </div>
          <div class="field">
            <label for="pk-brand">Grade</label>
            <select id="pk-brand">
              <option value="">— unrated —</option>
              <option value="A">A — Best condition</option>
              <option value="B">B — Good</option>
              <option value="C">C — Aging</option>
              <option value="Retired">Retired</option>
            </select>
          </div>
          <div class="field">
            <label for="pk-cells">Cell count (S)</label>
            <input type="number" id="pk-cells" min="1" max="12" required value="4">
          </div>
          <div class="field">
            <label for="pk-capacity">Capacity (mAh)</label>
            <input type="number" id="pk-capacity" min="0" placeholder="e.g. 1300">
          </div>
          <div class="field">
            <label for="pk-chem">Chemistry</label>
            <select id="pk-chem">
              <option value="LiPo">LiPo</option>
              <option value="LiHV">LiHV</option>
              <option value="Li-ion">Li-ion</option>
            </select>
          </div>
          <div class="field">
            <label for="pk-sticker">Sticker</label>
            <input type="text" id="pk-sticker" placeholder="e.g. Red dot, #1">
          </div>
          <div class="field">
            <label for="pk-max-cycles">Max cycles</label>
            <input type="number" id="pk-max-cycles" min="1" placeholder="e.g. 200">
          </div>
        </div>
        <div class="field" style="margin-bottom: 12px;">
          <label for="pk-notes">Notes</label>
          <textarea id="pk-notes" placeholder="Optional"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="primary">Add pack</button>
          <button type="button" id="cancel-add-pack">Cancel</button>
        </div>
      </form>
    </div>

    <div id="pack-grid" class="pack-grid"></div>
    <div id="empty-state" class="empty hidden">
      No packs yet. Add your first one to start logging cycles.
    </div>

    <div class="grid-controls">
      <div class="filter-menu">
        <button id="filter-toggle" class="filter-toggle" type="button">
          Filter
          <span id="filter-badge" class="filter-badge hidden">0</span>
        </button>
        <div id="filter-panel" class="filter-panel hidden">
          <label class="fp-row">
            <span>Grade</span>
            <select id="filter-grade">
              <option value="">All</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="Retired">Retired</option>
            </select>
          </label>
          <label class="fp-row">
            <span>Chemistry</span>
            <select id="filter-chem">
              <option value="">All</option>
              <option value="LiPo">LiPo</option>
              <option value="LiHV">LiHV</option>
              <option value="Li-ion">Li-ion</option>
            </select>
          </label>
          <label class="fp-row">
            <span>Health</span>
            <select id="filter-health">
              <option value="">All</option>
              <option value="healthy">Healthy</option>
              <option value="watch">Watch</option>
              <option value="check">Check</option>
              <option value="no data">No data</option>
            </select>
          </label>
          <div class="fp-footer">
            <span id="filter-count"></span>
            <a id="clear-filters" class="disabled">Clear</a>
          </div>
        </div>
      </div>
      <div class="sort-menu">
        <button id="sort-toggle" class="filter-toggle" type="button">Sort</button>
        <div id="sort-panel" class="filter-panel sort-panel hidden">
          <label class="fp-row">
            <span>Sort by</span>
            <select id="sort-by">
              <option value="name">Name</option>
              <option value="last_used">Last used</option>
              <option value="grade">Grade</option>
              <option value="health">Health</option>
            </select>
          </label>
          <label class="fp-row">
            <span>Order</span>
            <select id="sort-order">
              <option value="asc">Ascending</option>
              <option value="desc">Descending</option>
            </select>
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="panel hidden" id="fill-values-panel">
    <h2>Fill in resting voltages</h2>
    <p class="spec" id="fv-pack-label"></p>
    <form id="fill-values-form">
      <div class="field-grid">
        <div class="field">
          <label for="fv-voltage">Pack voltage (V)</label>
          <input type="number" id="fv-voltage" step="0.001" placeholder="e.g. 14.80">
        </div>
      </div>
      <div class="field" style="margin-bottom: 6px;">
        <label>Per-cell voltages (V)</label>
      </div>
      <div class="cell-inputs" id="fv-cell-inputs"></div>
      <div class="field" style="margin-bottom: 12px;">
        <label for="fv-notes">Notes</label>
        <textarea id="fv-notes" placeholder="e.g. landed hot, hard 3-min flight"></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="primary">Save values</button>
        <button type="button" id="cancel-fill-values">Cancel</button>
      </div>
    </form>
  </div>

  <div class="session-toast hidden" id="pack-toast" role="status"></div>

  <script src="/static/common.js?v=6"></script>
  <script src="/static/app.js?v=36"></script>
</body>
</html>
