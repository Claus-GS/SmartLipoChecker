<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voltlog — Flight log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=26">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Voltlog">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
  <script>
    (function () {
      var t = localStorage.getItem("voltlog-theme");
      if (t) document.documentElement.dataset.theme = t;
    })();
  </script>
</head>
<body>
  <div class="shell">
    <nav class="topnav">
      <a href="/">Home</a>
      <a href="/packs">Packs</a>
      <a href="/session" class="active">Session</a>
      <a href="/quads">Quads</a>
      <a href="/maintenance">Jobs</a>
    </nav>

    <header class="top">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 512 512" aria-hidden="true"><path d="M286 64 L150 280 H246 L226 448 L362 232 H266 Z"/></svg>
        <h1>Flight log</h1>
        <span class="tagline">Sessions, time, and packs flown</span>
      </div>
      <div class="header-actions">
        <button class="primary action-btn" id="add-flight-btn">
          <svg class="btn-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          <span>Log flight</span>
        </button>
        <a class="btn action-btn" href="/session">
          <svg class="btn-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          <span>Live session</span>
        </a>
        <button class="icon-btn icon-only" id="theme-btn" title="Toggle light / dark theme" aria-label="Toggle light / dark theme"></button>
      </div>
    </header>

    <div class="readout-row" id="summary-row"></div>

    <div class="panel hidden" id="flight-form-panel">
      <h2>Log a flight</h2>
      <form id="flight-form">
        <div class="field-grid">
          <div class="field">
            <label for="f-quad">Quad</label>
            <select id="f-quad"></select>
          </div>
          <div class="field">
            <label for="f-pack">Pack (optional)</label>
            <select id="f-pack"></select>
          </div>
          <div class="field">
            <label for="f-time">Date / time</label>
            <input type="datetime-local" id="f-time">
          </div>
          <div class="field">
            <label>Flight time</label>
            <div style="display:flex;gap:6px;">
              <input type="number" id="f-min" min="0" placeholder="min" style="width:50%;">
              <input type="number" id="f-sec" min="0" max="59" placeholder="sec" style="width:50%;">
            </div>
          </div>
          <div class="field">
            <label for="f-location">Location</label>
            <input type="text" id="f-location" placeholder="e.g. the spot">
          </div>
        </div>
        <div class="field" style="margin-bottom: 12px;">
          <label for="f-notes">Notes</label>
          <textarea id="f-notes" placeholder="e.g. clean session, one prop strike"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="primary" id="flight-submit">Log flight</button>
          <button type="button" id="flight-cancel" class="hidden">Cancel edit</button>
        </div>
      </form>
    </div>

    <div class="panel">
      <h3>Flights</h3>
      <table id="flights-table">
        <thead>
          <tr>
            <th>When</th>
            <th>Quad</th>
            <th>Pack</th>
            <th>Time</th>
            <th>Location</th>
            <th>Weather</th>
            <th>Notes</th>
            <th></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="flights-body"></tbody>
      </table>
      <div class="empty hidden" id="flights-empty">No flights logged yet.</div>
    </div>
  </div>

  <script src="/static/common.js?v=6"></script>
  <script src="/static/flights.js?v=3"></script>
</body>
</html>
