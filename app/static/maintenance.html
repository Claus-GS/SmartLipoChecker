<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voltlog — Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=26">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Voltlog">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
  <script>
    (function () {
      var t = localStorage.getItem("voltlog-theme");
      if (t) document.documentElement.dataset.theme = t;
    })();
  </script>
</head>
<body>
  <div class="shell">
    <nav class="topnav">
      <a href="/">Home</a>
      <a href="/packs">Packs</a>
      <a href="/session">Session</a>
      <a href="/quads">Quads</a>
      <a href="/maintenance" class="active">Jobs</a>
    </nav>

    <header class="top">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 512 512" aria-hidden="true"><path d="M286 64 L150 280 H246 L226 448 L362 232 H266 Z"/></svg>
        <h1>Maintenance</h1>
        <span class="tagline">Repairs, swaps, and inspections</span>
      </div>
      <div class="header-actions">
        <button class="primary action-btn" id="add-maint-btn">
          <svg class="btn-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          <span>Add job</span>
        </button>
        <button class="icon-btn icon-only" id="theme-btn" title="Toggle light / dark theme" aria-label="Toggle light / dark theme"></button>
      </div>
    </header>

    <div class="panel hidden" id="add-maint-panel">
      <h2>Add a job</h2>
      <form id="maint-form">
        <div class="field-grid">
          <div class="field">
            <label for="m-quad">Quad</label>
            <select id="m-quad"></select>
          </div>
          <div class="field">
            <label for="m-type">Type</label>
            <select id="m-type">
              <option value="">— pick —</option>
              <option>Crash</option>
              <option>Motor swap</option>
              <option>Prop change</option>
              <option>VTX</option>
              <option>Repair</option>
              <option>Inspection</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label for="m-date">Date</label>
            <input type="date" id="m-date">
          </div>
          <div class="field">
            <label for="m-status">Status</label>
            <select id="m-status">
              <option value="open">Open</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>
        <div class="field" style="margin-bottom: 12px;">
          <label for="m-desc">Description</label>
          <textarea id="m-desc" placeholder="e.g. replace rear-left motor, bent shaft"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="primary">Add job</button>
          <button type="button" id="cancel-add-maint">Cancel</button>
        </div>
      </form>
    </div>

    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
        <h3 style="margin:0;">Jobs</h3>
        <div style="display:flex;gap:8px;">
          <select id="filter-quad" style="width:auto;font-size:13px;padding:6px 8px;"></select>
          <select id="filter-status" style="width:auto;font-size:13px;padding:6px 8px;">
            <option value="">All status</option>
            <option value="open">Open</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>
      <table id="maint-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Quad</th>
            <th>Type</th>
            <th>Description</th>
            <th>Status</th>
            <th></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="maint-body"></tbody>
      </table>
      <div class="empty hidden" id="maint-empty">No maintenance jobs logged.</div>
    </div>
  </div>

  <script src="/static/common.js?v=6"></script>
  <script src="/static/maintenance.js?v=4"></script>
</body>
</html>
